# BuildCraft — API service (Fastify)
# Railway service name: api | Root Directory: backend

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["src/**", "prisma/**", "package.json", "package-lock.json", "tsconfig.json"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
numReplicas = 1
preDeployCommand = ["npx prisma migrate deploy"]
